<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css">
    <title>Automotores</title>
</head>
<body>
    <header>
        <h1>Automotores</h1>
    </header>
    <form>
        <h2>Carga de datos</h2>
        <label>Marca: <input type="text" id="m" required></label>
        <label>Precio de lista: <input type="number" id="p" step="0.01" min="1" required></label>
        <label>Cliente: <input type="text" id="c" required></label>
        <button type="reset" id="ing">Ingresar</button>
    </form>
    <div id="salida"></div>
    <form>
        <h2>Buscar Presupuesto</h2>
        <input type="text" id="busCliente" placeholder="Ingrese cliente" required>
        <button type="button" id="buscar">Buscar</button>
    </form>
    <div id="salidaBusqueda"></div>
    <script src="script.js"></script>
</body>
</html>
